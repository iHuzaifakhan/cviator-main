# .github/workflows/main.yml
# ---------------------------------------------------------------
# CI/CD pipeline for Cviator Pro.
#
# Triggers on every push/PR to `main`.
# Steps:
#   1. Checkout
#   2. Install + build frontend (smoke check)
#   3. Build Docker images for backend & frontend
#   4. On push to main: push images to Docker Hub
#
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   your Docker Hub username
#   DOCKERHUB_TOKEN      a Docker Hub access token (NOT your password)
# ---------------------------------------------------------------

name: Cviator CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Dockerize
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --omit=dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # Smoke build to catch syntax errors early. NEXT_PUBLIC_API_URL is left
      # empty — the runtime auto-detects the backend in the browser.
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in only on push to main so PRs from forks don't try to auth.
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cviator-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cviator-backend:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cviator-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cviator-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=
